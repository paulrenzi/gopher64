name: Build Gopher64 (Dynamic SDL3)
permissions:
  contents: write

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu
          rustflags: ""
      - name: Set LLVM_VERSION
        run: echo "LLVM_VERSION=$(rustc --version --verbose | grep "LLVM version" | cut -d':' -f2 | xargs)" >> $GITHUB_ENV
      - name: Install SDL Dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: build-essential git make \
            pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
            libaudio-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
            libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
            libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev fcitx-libs-dev \
            libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev libfreetype-dev libfontconfig-dev
          version: x86_64-unknown-linux-gnu-1.0
      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}
          force-url: https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/LLVM-${{ env.LLVM_VERSION }}-Linux-X64.tar.xz
      - name: Build
        run: cargo build --release -v --target=x86_64-unknown-linux-gnu
      - name: Collect artifacts
        run: |
          mkdir -p output
          cp target/x86_64-unknown-linux-gnu/release/gopher64 output/
          # Find and copy the dynamically-linked SDL3 shared libraries
          find target/x86_64-unknown-linux-gnu/release/build/ -name "libSDL3.so*" -not -name "*.a" | head -1 | xargs -I{} cp {} output/libSDL3.so.0
          find target/x86_64-unknown-linux-gnu/release/build/ -name "libSDL3_ttf.so*" -not -name "*.a" | head -1 | xargs -I{} cp {} output/libSDL3_ttf.so.0
          echo "=== Output contents ==="
          ls -la output/
          echo "=== Verify dynamic linking ==="
          ldd output/gopher64 | grep -i sdl || echo "SDL not in ldd (may use RPATH)"
          readelf -d output/gopher64 | grep -i -E "NEEDED|RPATH|RUNPATH" || true
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gopher64-dynamic-sdl3-linux-x86_64
          path: output/
          archive: false
